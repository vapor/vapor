name: Generate Sponsors README
on: workflow_dispatch
permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Get token
        id: get-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.PENNY_APP_CLIENT_ID }}
          private-key: ${{ secrets.PENNY_APP_PRIVATE_KEY }}

      - name: Generate Sponsors
        uses: JamesIves/github-sponsors-readme-action@2fd9142e765f755780202122261dc85e78459405 # v1.6.0
        with:
          # We have to use a PAT here as app tokens don't have access to the info
          token: ${{ secrets.SPONSORS_PAT }}
          file: "README.md"
          minimum: 500
          maximum: 9900
          marker: "backers"
          organization: true

      - name: Commit and create PR
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ steps.get-token.outputs.token }}
          commit-message: "[skip ci] Update README with new sponsor"
          committer: "Penny[bot] <360798+penny[bot]@vapor.codes>"
          author: "Penny[bot] <360798+penny[bot]@vapor.codes>"
          branch: update-sponsors
          delete-branch: true
          title: Update README with new sponsor
          body: Update README adding new sponsor
          labels: no-release-needed,sponsors
          reviewers: 0xTim
